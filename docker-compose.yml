x-common-build: &common-build
  context: .
  args:
    BUILDKIT_INLINE_CACHE: "1"

x-service-env: &service-env
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_USER: ${MYSQL_USER}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD}
  EUREKA_URI: http://naming-server:8761/eureka
  CONFIG_SERVER_URI: http://config-server:8888
  ZIPKIN_URI: http://zipkin:9411
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
  INTERNAL_TOKEN: ${INTERNAL_TOKEN}

services:
  mysql:
    image: mysql:8.4
    container_name: bookstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: user_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  zipkin:
    image: openzipkin/zipkin:3
    container_name: bookstore-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9411/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  naming-server:
    build:
      <<: *common-build
      dockerfile: naming-server/Dockerfile
    image: bookstore/naming-server:latest
    container_name: bookstore-naming-server
    restart: unless-stopped
    environment:
      EUREKA_PORT: 8761
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  config-server:
    build:
      <<: *common-build
      dockerfile: config-server/Dockerfile
    image: bookstore/config-server:latest
    container_name: bookstore-config-server
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: 8888
      EUREKA_URI: http://naming-server:8761/eureka
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    depends_on:
      naming-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 50s

  user-service:
    build:
      <<: *common-build
      dockerfile: user-service/Dockerfile
    image: bookstore/user-service:latest
    container_name: bookstore-user-service
    restart: unless-stopped
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mysql:
        condition: service_healthy
      naming-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/api/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s

  book-service:
    build:
      <<: *common-build
      dockerfile: book-service/Dockerfile
    image: bookstore/book-service:latest
    container_name: bookstore-book-service
    restart: unless-stopped
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mysql:
        condition: service_healthy
      naming-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/api/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s

  cart-service:
    build:
      <<: *common-build
      dockerfile: cart-service/Dockerfile
    image: bookstore/cart-service:latest
    container_name: bookstore-cart-service
    restart: unless-stopped
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mysql:
        condition: service_healthy
      naming-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8003/api/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s

  order-service:
    build:
      <<: *common-build
      dockerfile: order-service/Dockerfile
    image: bookstore/order-service:latest
    container_name: bookstore-order-service
    restart: unless-stopped
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mysql:
        condition: service_healthy
      naming-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8004/api/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s

  api-gateway:
    build:
      <<: *common-build
      dockerfile: api-gateway/Dockerfile
    image: bookstore/api-gateway:latest
    container_name: bookstore-api-gateway
    restart: unless-stopped
    environment:
      <<: *service-env
      GATEWAY_PORT: 8765
    ports:
      - "${GATEWAY_PORT:-8765}:8765"
    depends_on:
      naming-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8765/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  mysql-data:
    driver: local
